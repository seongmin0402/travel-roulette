<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운명의 여행 룰렛 🎲</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=jyt46rorf8"></script>
</head>
<body class="season-spring">
  <canvas id="particleCanvas"></canvas>

  <div class="loader-overlay" id="loaderOverlay">
    <div class="loader-box">
      <div class="loader-spinner"></div>
      <p class="loader-title">여행지 목록 불러오는 중</p>
      <p class="loader-sub" id="loaderSub">전국 시군구 정보 로딩 중...</p>
      <div class="loader-bar-wrap"><div class="loader-bar" id="loaderBar"></div></div>
    </div>
  </div>

  <div class="container">
    <header class="header">
      <div class="header-badge">국내 여행</div>
      <h1>운명의 여행 룰렛</h1>
      <p class="header-sub">오늘 어디 갈지 모르겠다면, 운명에 맡겨라 🎲</p>
    </header>

    <section class="conditions-panel glass-card">
      <h2 class="section-title">✨ 여행 조건 설정</h2>

      <div class="condition-row">
        <div class="condition-group">
          <label class="condition-label">🌸 계절</label>
          <div class="chips" id="seasonChips" data-mode="single">
            <button class="chip" data-value="spring">봄</button>
            <button class="chip" data-value="summer">여름</button>
            <button class="chip" data-value="fall">가을</button>
            <button class="chip" data-value="winter">겨울</button>
            <button class="chip active" data-value="any">상관없음</button>
          </div>
        </div>
        <div class="condition-group">
          <label class="condition-label">📅 여행 기간</label>
          <div class="chips" id="durationChips" data-mode="single">
            <button class="chip" data-value="day">당일치기</button>
            <button class="chip" data-value="1night">1박 2일</button>
            <button class="chip" data-value="2night">2박 3일</button>
            <button class="chip" data-value="long">4박 이상</button>
            <button class="chip active" data-value="any">상관없음</button>
          </div>
        </div>
      </div>

      <div class="condition-row">
        <div class="condition-group">
          <label class="condition-label">💰 예산 <span class="hint">1인 기준</span></label>
          <div class="chips" id="budgetChips" data-mode="single">
            <button class="chip" data-value="low">~10만원</button>
            <button class="chip" data-value="mid">10~30만원</button>
            <button class="chip" data-value="high">30~50만원</button>
            <button class="chip" data-value="luxury">50만원+</button>
            <button class="chip active" data-value="any">상관없음</button>
          </div>
        </div>
        <div class="condition-group">
          <label class="condition-label">👥 동행</label>
          <div class="chips" id="companionChips" data-mode="single">
            <button class="chip" data-value="solo">혼자</button>
            <button class="chip" data-value="couple">커플</button>
            <button class="chip" data-value="family">가족</button>
            <button class="chip" data-value="friends">친구</button>
            <button class="chip active" data-value="any">상관없음</button>
          </div>
        </div>
      </div>

      <div class="condition-row">
        <div class="condition-group">
          <label class="condition-label">🚗 이동수단</label>
          <div class="chips" id="transportChips" data-mode="single">
            <button class="chip" data-value="car">자가용</button>
            <button class="chip" data-value="transit">대중교통</button>
            <button class="chip active" data-value="any">상관없음</button>
          </div>
        </div>
      </div>

      <div class="condition-group full-width">
        <label class="condition-label">🎯 테마 <span class="hint">복수 선택 가능</span></label>
        <div class="chips" id="themeChips" data-mode="multi">
          <button class="chip" data-value="nature">🌿 자연·힐링</button>
          <button class="chip" data-value="history">🏯 역사·문화</button>
          <button class="chip" data-value="food">🍜 맛집투어</button>
          <button class="chip" data-value="activity">🏄 액티비티</button>
          <button class="chip" data-value="city">🏙️ 도시·쇼핑</button>
          <button class="chip" data-value="photo">📸 사진·인스타</button>
          <button class="chip" data-value="beach">🏖️ 바다</button>
          <button class="chip" data-value="hot_spring">♨️ 온천·스파</button>
          <button class="chip active" data-value="any">상관없음</button>
        </div>
      </div>
    </section>

    <section class="roulette-section">
      <div class="roulette-machine glass-card">
        <div class="machine-top">
          <span class="machine-light"></span>
          <span class="machine-light"></span>
          <span class="machine-light"></span>
        </div>
        <div class="machine-label">🗺️ 목적지</div>
        <div class="slot-window">
          <div class="slot-reel" id="slotReel">
            <div class="reel-item placeholder">어디든 갈 수 있어!</div>
          </div>
          <div class="slot-fade top"></div>
          <div class="slot-fade bottom"></div>
        </div>
        <div class="match-count" id="matchCount"></div>
      </div>
      <button class="spin-btn" id="spinBtn">
        <span class="spin-icon">🎰</span>
        <span>돌려!</span>
      </button>
      <p class="spin-hint" id="spinHint">조건을 설정하고 돌려보세요!</p>
    </section>

    <section class="result-section hidden" id="resultSection">
      <div class="result-card glass-card" id="resultCard">
        <div class="result-image-wrap">
          <img id="resultImage" src="" alt="" class="result-image">
          <div class="result-image-overlay"></div>
          <div class="result-weather-badge" id="weatherBadge">
            <span id="weatherIcon">☀️</span>
            <span id="weatherTemp">--°C</span>
          </div>
        </div>
        <div class="result-body">
          <div class="result-region-tag" id="resultRegion"></div>
          <h2 class="result-name" id="resultName"></h2>
          <p class="result-desc" id="resultDesc"></p>
          <div class="result-highlights" id="resultHighlights"></div>
          <div class="result-actions">
            <button class="btn-primary" id="detailBtn">✈️ 상세 정보 보기</button>
            <button class="btn-secondary" id="reSpinBtn">🔄 다시 돌리기</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal glass-card" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <p id="modalSubtitle"></p>
      </div>

      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="attraction">📍 관광지</button>
        <button class="modal-tab" data-tab="restaurant">🍽️ 맛집</button>
        <button class="modal-tab" data-tab="accommodation">🏨 숙소</button>
        <button class="modal-tab" data-tab="transit">🚌 교통편</button>
      </div>

      <div class="modal-tab-content active" id="tab-attraction">
        <div class="spot-grid" id="attractionGrid">
          <div class="loading-wrap"><div class="loading-spinner"></div><p>불러오는 중...</p></div>
        </div>
      </div>
      <div class="modal-tab-content hidden" id="tab-restaurant">
        <div class="spot-grid" id="restaurantGrid">
          <div class="loading-wrap"><div class="loading-spinner"></div><p>불러오는 중...</p></div>
        </div>
      </div>
      <div class="modal-tab-content hidden" id="tab-accommodation">
        <div class="spot-grid" id="accommodationGrid">
          <div class="loading-wrap"><div class="loading-spinner"></div><p>불러오는 중...</p></div>
        </div>
      </div>

      <div class="modal-tab-content hidden" id="tab-transit">
        <div class="transit-panel">
          <div class="transit-search-box">
            <div class="transit-search-row">
              <div class="transit-field">
                <label class="transit-label">🚀 출발지</label>
                <div class="transit-input-wrap">
                  <input type="text" id="departureInput" class="transit-input"
                    placeholder="출발지 입력 (예: 서울역, 강남구청)" />
                  <button class="transit-search-btn" id="searchTransitBtn">경로 찾기</button>
                </div>
              </div>
              <div class="transit-field">
                <label class="transit-label">🏁 도착지</label>
                <div class="transit-dest-value" id="transitDestLabel">—</div>
              </div>
            </div>
            <div class="transit-mode-btns">
              <button class="transit-mode-btn active" data-mode="car">🚗 자가용</button>
              <button class="transit-mode-btn" data-mode="transit">🚌 대중교통</button>
              <button class="transit-mode-btn" data-mode="longdist">🚄 기차·버스·항공</button>
            </div>
          </div>
          <div id="kakaoMap" class="kakao-map"></div>
          <div id="transitResults" class="transit-results">
            <div class="transit-hint">출발지를 입력하고 <strong>경로 찾기</strong>를 눌러보세요</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/destinations.js"></script>
  <script src="js/api.js"></script>
  <script src="js/roulette.js"></script>
  <script src="js/transit.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
